services:
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      server:
        condition: service_started
  
  server:
    build: ./server
    ports:
      - "3000:3000"
    environment:
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    depends_on:
      meilisearch:
        condition: service_started
      ollama:
        condition: service_started

  meilisearch:
    image: getmeili/meilisearch:v1.15
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
    volumes:
      - meili_data:/meili_data
  
  ollama:
    image: ollama/ollama
    ports: 
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama 

volumes:
  meili_data:
  ollama_data: